<!-- ==========================================
     HERO SECTION (ExoApe Style — Tipografía Masiva)
     ========================================== -->
<section class="relative w-full h-screen flex items-end overflow-hidden bg-brand-dark">
    <!-- Hero Video Shein Velez -->
    <video autoplay loop muted playsinline class="absolute inset-0 w-full h-full object-cover opacity-60">
        <source src="https://videos.pexels.com/video-files/37400179/15839874_1440_2560_24fps.mp4" type="video/mp4">
    </video>
    <div class="surreal-scanline absolute inset-0 opacity-30"></div>
    <div class="hero-mirror hidden md:block"></div>

    <div class="hero-info absolute top-24 left-6 md:left-12 z-10 text-white/60 font-sans text-xs uppercase tracking-widest">
        <p>&#10022; Coleccion 2026</p>
    </div>
    <div class="hero-info absolute top-24 right-6 md:right-12 z-10 text-white/60 font-sans text-xs uppercase tracking-widest text-right">
        <p>Colombia</p>
    </div>

    <div class="relative z-10 w-full px-6 md:px-12 pb-16 text-center md:text-left">
        <h1 class="hero-title font-serif font-bold text-[#d4af37] leading-[0.9] tracking-widest" style="font-size: clamp(60px, 12vw, 180px);">Shein<br>Vélez</h1>
        <div class="flex flex-col md:flex-row justify-between md:items-end gap-8 mt-6">
            <p class="hero-subtitle font-sans text-sm md:text-base text-white/80 uppercase tracking-[0.4em] max-w-xs">Elegancia en Movimiento</p>
            <div class="hero-subtitle flex flex-wrap gap-3">
                <a href="#catalogo" class="bg-white text-brand-dark text-xs uppercase tracking-widest font-bold px-6 py-4 hover:bg-brand-dark hover:text-white transition-colors">Ver coleccion</a>
                <a href="https://wa.me/573000000000?text=Hola%20Vshein%2C%20quiero%20asesoria%20para%20comprar" target="_blank" class="border border-white/40 text-white text-xs uppercase tracking-widest font-bold px-6 py-4 hover:bg-white hover:text-brand-dark transition-colors track-click" data-target="whatsapp" data-item="hero">Comprar por WhatsApp</a>
            </div>
        </div>
        <!-- Tira lateral de moda — imágenes desde la BD -->
        <div class="hidden lg:block absolute right-6 top-1/2 -translate-y-1/2 z-10 overflow-hidden rounded-lg" style="height: 65vh; width: 88px;">
            <div style="animation: stripScroll 18s linear infinite; display: flex; flex-direction: column; gap: 12px;">
                {% for p in products if p.media %}
                <img src="{{ p.media[0].file_path }}" class="w-full rounded-md opacity-75 hover:opacity-100 transition-opacity" style="aspect-ratio:2/3;object-fit:cover;" alt="{{ p.name }}">
                {% endfor %}
                {# duplicado para loop continuo #}
                {% for p in products if p.media %}
                <img src="{{ p.media[0].file_path }}" class="w-full rounded-md opacity-75" style="aspect-ratio:2/3;object-fit:cover;" alt="{{ p.name }}">
                {% endfor %}
            </div>
        </div>
    </div>
</section>
