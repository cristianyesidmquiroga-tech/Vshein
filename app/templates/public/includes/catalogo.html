<!-- ==========================================
     CATÁLOGO DE PRODUCTOS (Grilla Exclusiva)
     ========================================== -->
<section id="catalogo" class="py-24 px-6 md:px-12 bg-[#f5f0ec]">
    <div class="max-w-7xl mx-auto text-center" data-anim="reveal">
        <h2 class="font-serif text-4xl md:text-6xl text-brand-dark mb-8">Colección Exclusiva</h2>
        
        <!-- Filtros del Catálogo -->
        <div class="flex flex-wrap justify-center gap-4 mb-12">
            <button class="catalog-filter bg-brand-dark text-white text-[11px] uppercase tracking-widest font-bold px-4 py-3" data-filter="all">Todos</button>
            <button class="catalog-filter border border-black/10 text-brand-dark text-[11px] uppercase tracking-widest font-bold px-4 py-3 hover:bg-white transition-colors" data-filter="mujer">Mujer</button>
            <button class="catalog-filter border border-black/10 text-brand-dark text-[11px] uppercase tracking-widest font-bold px-4 py-3 hover:bg-white transition-colors" data-filter="ninos">Niños</button>
            <button class="catalog-filter border border-black/10 text-brand-dark text-[11px] uppercase tracking-widest font-bold px-4 py-3 hover:bg-white transition-colors" data-filter="accesorios">Accesorios</button>
        </div>

        <div id="new-catalog-grid" class="grid grid-cols-1 md:grid-cols-3 gap-8 text-left">
            {% if products %}
                {% for product in products %}
                <article class="product-card bg-white p-4 rounded-lg group cursor-pointer backdrop-blur-sm border border-black/5 relative transition-all duration-300 hover:-translate-y-1 hover:shadow-lg"
                         data-category="{{ product.category }}"
                         data-product='{{ {"id": product.id, "name": product.name, "description": product.description or "", "category": product.category, "subcategory": product.subcategory or "", "sizes": product.sizes or "", "image": product.media[0].file_path if product.media else ""}|tojson }}'>
                    <div class="relative w-full aspect-[3/4] overflow-hidden mb-4 rounded">
                        {% if product.media %}
                            <img src="{{ product.media[0].file_path }}" class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-105" alt="{{ product.name }}">
                        {% else %}
                            <div class="w-full h-full bg-black/5 flex items-center justify-center text-brand-dark/50 text-sm font-serif">Sin Imagen</div>
                        {% endif %}
                        
                        <div class="absolute top-3 left-3 bg-white text-brand-dark text-[9px] uppercase tracking-widest font-bold px-2 py-1 rounded-sm border border-black/10 shadow-sm capitalize">
                            {{ product.category }}
                        </div>
                    </div>
                    <div class="text-center">
                        <h3 class="font-serif text-lg mb-1 text-brand-dark">{{ product.name }}</h3>
                        <p class="font-sans text-[10px] uppercase tracking-widest text-brand-dark/50 mb-3">Tallas: {{ product.sizes }}</p>
                        <span class="inline-block border border-brand-dark text-brand-dark group-hover:bg-brand-dark group-hover:text-white transition-colors px-6 py-2 text-[10px] uppercase tracking-widest font-bold w-full">Ver Detalles</span>
                    </div>
                </article>
                {% endfor %}
            {% endif %}
        </div>
    </div>
</section>
