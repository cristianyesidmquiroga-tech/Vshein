{% extends "base.html" %}

{% block title %}404 - Página no encontrada | VSHEIN{% endblock %}

{% block content %}
<!-- Film grain para la 404 -->
<style>
  .film-grain::after {
      content: ''; position: fixed; inset: 0; z-index: 9999;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none; opacity: 0.5;
  }
</style>

<section class="film-grain relative w-full h-screen flex flex-col items-center justify-center overflow-hidden bg-brand-dark">
    <!-- Video de moda editorial — modelo en pasarela/sesión de fotos -->
    <video autoplay loop muted playsinline class="absolute inset-0 w-full h-full object-cover opacity-25 grayscale">
        <source src="https://videos.pexels.com/video-files/7645990/7645990-uhd_2560_1440_25fps.mp4" type="video/mp4">
        <source src="https://videos.pexels.com/video-files/3735232/3735232-uhd_2560_1440_25fps.mp4" type="video/mp4">
    </video>

    <!-- Superposición de gradiente sutil -->
    <div class="absolute inset-0 bg-gradient-to-t from-brand-dark via-brand-dark/80 to-brand-dark/50"></div>

    <div class="relative z-10 flex flex-col items-center text-center px-6 mt-16">
        <p class="font-sans text-xs md:text-sm text-white/50 uppercase tracking-[0.4em] mb-4" data-anim="reveal">Error</p>
        
        <h1 class="font-serif font-bold text-white leading-[0.8] tracking-tighter" style="font-size: clamp(100px, 20vw, 300px);" data-anim="reveal">
            404
        </h1>
        
        <p class="font-serif text-2xl md:text-4xl text-white/80 mt-6 mb-12" data-anim="reveal">
            Página no encontrada
        </p>

        <a href="{{ url_for('public.index') }}" data-anim="reveal" class="group relative inline-flex items-center justify-center px-8 py-4 font-sans text-xs uppercase tracking-widest text-brand-dark bg-white overflow-hidden rounded-full transition-transform hover:scale-105 duration-500 shadow-[0_0_40px_rgba(255,255,255,0.1)]">
            <span class="relative z-10 font-bold">Volver al inicio</span>
            <div class="absolute inset-0 bg-[#f5f0ec] transform scale-x-0 origin-left group-hover:scale-x-100 transition-transform duration-500 ease-out z-0"></div>
        </a>
    </div>
</section>

<script>
    // Pequeña animación para la 404
    document.addEventListener("DOMContentLoaded", () => {
        gsap.utils.toArray("[data-anim='reveal']").forEach((el, i) => {
            gsap.fromTo(el, 
                { opacity: 0, y: 40 },
                { opacity: 1, y: 0, duration: 1.2, delay: i * 0.15, ease: "power4.out" }
            );
        });
    });
</script>
{% endblock %}
